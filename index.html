
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain's Quest AI Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=MedievalSharp&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1a2a;
            color: #e5e7eb;
            overflow-x: hidden;
        }
        .font-pirate {
            font-family: 'Pirata One', cursive;
        }
        .font-medieval {
            font-family: 'MedievalSharp', cursive;
        }
        
        /* Ambient Floating Dust/Gold Motes */
        @keyframes motes {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }
        .mote {
            position: fixed;
            background: radial-gradient(circle, rgba(255,215,0,0.8) 0%, rgba(255,215,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: motes 15s linear infinite;
        }

        /* 3D Perspective Card Tilt & Scale */
        .pirate-card-tilt {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, filter 0.4s ease;
            transform-style: preserve-3d;
            will-change: transform, box-shadow;
        }
        .pirate-card-tilt:hover {
            transform: translateY(-12px) scale(1.03) rotateX(4deg) rotateY(-2deg);
            box-shadow: 0 40px 80px -15px rgba(202, 138, 4, 0.45), 0 0 20px rgba(251, 191, 36, 0.1);
            filter: brightness(1.05);
        }

        /* Ship Rolling on Waves Effect */
        @keyframes ship-roll {
            0%, 100% { transform: rotate(-1deg) translateY(0); }
            50% { transform: rotate(1deg) translateY(-3px); }
        }
        .hover-ship-roll:hover {
            animation: ship-roll 3s ease-in-out infinite;
        }

        /* Parchment Unroll Effect */
        @keyframes unroll {
            from { clip-path: inset(0 0 100% 0); transform: translateY(-20px); opacity: 0; }
            to { clip-path: inset(0 0 0 0); transform: translateY(0); opacity: 1; }
        }
        .animate-unroll {
            animation: unroll 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* Treasure Glow */
        .treasure-glow:hover {
            filter: drop-shadow(0 0 15px rgba(234, 179, 8, 0.8));
        }

        /* Sparkle for the Treasure */
        @keyframes treasure-sparkle {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 5px gold); }
            50% { filter: brightness(1.4) drop-shadow(0 0 20px gold); }
        }
        .animate-treasure-sparkle {
            animation: treasure-sparkle 2s ease-in-out infinite;
        }

        /* Liquid Gold Animation for Progress Bar */
        @keyframes liquid-gold {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-liquid {
            background-size: 200% 200%;
            animation: liquid-gold 3s ease infinite;
            position: relative;
        }
        .animate-liquid::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: liquid-gold 2s linear infinite reverse;
        }

        /* Waves Layering */
        .waves {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12vh;
            background: url('https://raw.githubusercontent.com/mrfront/ocean-waves/master/wave.png');
            background-size: 1000px 100px;
            animation: wave 12s linear infinite;
            filter: hue-rotate(10deg) brightness(0.8);
        }
        @keyframes wave {
            0% { background-position-x: 0; }
            100% { background-position-x: 1000px; }
        }

        /* Scrollbar Pirate Styling */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #07131f; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, #78350f, #92400e); 
            border: 2px solid #07131f;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: #b45309; }

        /* Shine Effect Overlay */
        .hover-shine {
            position: relative;
            overflow: hidden;
        }
        .hover-shine::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -150%;
            width: 50%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(30deg);
            transition: left 0.6s ease;
        }
        .hover-shine:hover::after {
            left: 150%;
        }

        @media print {
            .print\:hidden { display: none !important; }
            nav, footer, .waves, .mote { display: none !important; }
            #root { background: white !important; color: black !important; }
        }
    </style>
